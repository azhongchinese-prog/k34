<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房间布置 - 学习方位词 (Trắc nghiệm)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc; /* Slate 50 */
            user-select: none;
        }

        /* Styling for Pinyin */
        ruby {
            ruby-align: center;
            font-size: 1.5rem;
        }
        rt {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: normal;
            transform: translateY(-2px);
        }

        /* Animations */
        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .success-flash {
            animation: successFlash 1s ease-out;
        }
        @keyframes successFlash {
            0% { background-color: #bbf7d0; box-shadow: 0 0 20px #22c55e; }
            100% { background-color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        }

        .answer-btn {
            transition: all 0.2s;
        }
        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .answer-btn:active {
            transform: translateY(0);
        }
        
        /* Grid styling */
        .grid-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            height: 100px;
        }
        .item-slot {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Header -->
    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-700 mb-2" id="title-text"></h1>
        <div class="inline-block bg-white px-5 py-2 rounded-full shadow-sm text-indigo-600 font-bold border border-indigo-100" id="score-text"></div>
    </header>

    <!-- Main Game Area -->
    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
        
        <!-- Room Grid (Left side on Desktop, Top on Mobile) -->
        <div class="flex flex-col items-center bg-white p-6 rounded-3xl shadow-lg border border-slate-100 w-full">
            
            <!-- Instruction Prompt -->
            <div class="bg-indigo-50 border-2 border-indigo-200 rounded-2xl p-4 sm:p-5 mb-6 w-full text-center flex flex-col items-center gap-3">
                <p class="text-xl sm:text-2xl text-indigo-900 leading-loose" id="instruction-text">
                    <!-- Instruction generated by JS -->
                </p>
                
                <button id="hint-btn" onclick="showAnswer()" class="text-sm bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-full hover:bg-indigo-100 transition shadow-sm flex items-center justify-center gap-1 w-max">
                    💡 <span id="hint-text"></span>
                </button>
                
                <!-- Feedback message with flexible height to prevent layout shift and text clipping -->
                <div id="feedback-msg" class="text-base sm:text-lg font-bold min-h-[3.5rem] flex items-center justify-center w-full break-words px-2 text-emerald-600"></div>
            </div>

            <!-- 3x3 Grid representing the room -->
            <div class="grid grid-cols-3 grid-rows-3 gap-3 w-full max-w-sm aspect-square bg-slate-50 p-3 rounded-2xl shadow-inner relative">
                
                <!-- Top Row -->
                <div class="grid-cell"></div>
                <div class="grid-cell bg-white border-2 border-dashed border-slate-200" id="zone-shangbian">
                    <div class="item-slot"></div>
                </div>
                <div class="grid-cell"></div>

                <!-- Middle Row -->
                <div class="grid-cell bg-white border-2 border-dashed border-slate-200" id="zone-zuobian">
                    <div class="item-slot"></div>
                </div>
                
                <!-- Center Object (Reference) -->
                <div class="grid-cell border-2 border-indigo-300 bg-indigo-50 shadow-sm relative z-10 flex-col">
                    <span class="text-5xl mb-1 drop-shadow-md">🪑</span>
                    <span class="text-xs font-bold text-indigo-700 mt-1">桌子</span>
                </div>

                <div class="grid-cell bg-white border-2 border-dashed border-slate-200" id="zone-youbian">
                    <div class="item-slot"></div>
                </div>

                <!-- Bottom Row -->
                <div class="grid-cell bg-white border-2 border-dashed border-slate-200 relative" id="zone-pangbian">
                    <!-- Note for "旁边" (Beside) placed in the corner to differentiate from exact left/right -->
                    <div class="item-slot"></div>
                </div>
                <div class="grid-cell bg-white border-2 border-dashed border-slate-200" id="zone-xiabian">
                    <div class="item-slot"></div>
                </div>
                <div class="grid-cell"></div>

            </div>
        </div>

        <!-- Answers Panel (Right side) -->
        <div class="flex flex-col w-full h-full">
            <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 h-full flex flex-col">
                <h2 class="text-xl text-center mb-6 text-slate-700 font-bold border-b pb-4" id="inventory-title"></h2>
                
                <!-- Answer Buttons -->
                <div id="answers-container" class="flex flex-col gap-4 flex-grow justify-center">
                    <!-- Buttons generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Element for Success/Fail -->
    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
    <audio id="fail-sound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

    <script>
        // 1. Pinyin Dictionary
        const pinyinDict = {
            '找': 'zhǎo', '位': 'wèi', '置': 'zhì', '得': 'dé', '分': 'fēn', 
            '选': 'xuǎn', '择': 'zé', '答': 'dá', '案': 'àn', '看': 'kàn', '很': 'hěn', '好': 'hǎo',
            '手': 'shǒu', '表': 'biǎo', '报': 'bào', '纸': 'zhǐ', '牛': 'niú', '奶': 'nǎi',
            '上': 'shàng', '下': 'xià', '左': 'zuǒ', '右': 'yòu', '旁': 'páng', '边': 'bian',
            '桌': 'zhuō', '子': 'zi',
            '请': 'qǐng', '问': 'wèn', '在': 'zài', '哪': 'nǎ', '里': 'lǐ', '的': 'de',
            '真': 'zhēn', '棒': 'bàng', '不': 'bù', '对': 'duì', '再': 'zài', '试': 'shì', '一': 'yí', '次': 'cì'
        };

        function pinyinize(text) {
            let result = '';
            for (let char of text) {
                if (pinyinDict[char]) {
                    result += `<ruby>${char}<rt>${pinyinDict[char]}</rt></ruby>`;
                } else {
                    result += char;
                }
            }
            return result;
        }

        // 2. Game Data
        const items = [
            { id: 'shoubiao', char: '手表', emoji: '⌚️' },
            { id: 'baozhi', char: '报纸', emoji: '📰' },
            { id: 'niunai', char: '牛奶', emoji: '🥛' }
        ];

        const zones = [
            { id: 'shangbian', char: '上边', icon: '⬆️' },
            { id: 'xiabian', char: '下边', icon: '⬇️' },
            { id: 'zuobian', char: '左边', icon: '⬅️' },
            { id: 'youbian', char: '右边', icon: '➡️' },
            { id: 'pangbian', char: '旁边', icon: '🔄' }
        ];

        // 3. Game State
        let score = 0;
        let currentTask = { item: null, zone: null };
        let isWaitingForNext = false;
        let hasUsedHint = false;

        // 4. Initialization
        function initApp() {
            document.getElementById('title-text').innerHTML = pinyinize('找位置');
            document.getElementById('inventory-title').innerHTML = pinyinize('选择答案');
            document.getElementById('hint-text').innerHTML = pinyinize('看答案');
            updateScore();

            const answersContainer = document.getElementById('answers-container');
            
            // Create answer buttons
            zones.forEach(zone => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn w-full bg-white border-2 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 text-slate-700 rounded-2xl p-4 flex items-center justify-between text-left shadow-sm';
                btn.dataset.zone = zone.id;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-2xl opacity-50">${zone.icon}</div>
                        <div class="font-bold">${pinyinize(zone.char)}</div>
                    </div>
                    <div class="text-slate-300">❯</div>
                `;

                btn.onclick = () => checkAnswer(zone.id, btn);
                answersContainer.appendChild(btn);
            });

            generateNewTask();
        }

        function updateScore() {
            document.getElementById('score-text').innerHTML = pinyinize(`得分: ${score}`);
        }

        // 5. Game Logic
        function generateNewTask() {
            isWaitingForNext = false;
            hasUsedHint = false;
            document.getElementById('hint-btn').style.display = 'inline-flex';
            
            // Reset UI
            document.querySelectorAll('.item-slot').forEach(el => {
                el.innerHTML = '';
                el.classList.remove('pop-in');
            });
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.classList.remove('bg-red-50', 'border-red-400', 'bg-emerald-50', 'border-emerald-400', 'success-flash', 'ring-4', 'ring-yellow-400', 'bg-yellow-50');
                btn.disabled = false;
            });
            
            const feedback = document.getElementById('feedback-msg');
            feedback.innerHTML = '';
            feedback.className = 'text-base sm:text-lg font-bold min-h-[3.5rem] flex items-center justify-center w-full break-words px-2 text-emerald-600';

            // Pick random item and zone
            const randomItem = items[Math.floor(Math.random() * items.length)];
            const randomZone = zones[Math.floor(Math.random() * zones.length)];
            currentTask = { item: randomItem, zone: randomZone };

            // Place item in grid with animation
            const slot = document.querySelector(`#zone-${randomZone.id} .item-slot`);
            slot.innerHTML = randomItem.emoji;
            
            // Force browser reflow to restart animation
            void slot.offsetWidth; 
            slot.classList.add('pop-in');

            // Generate instruction: 请问，[Item] 在哪里？
            const instructionHTML = 
                pinyinize('请问，') + 
                `<span class="font-bold text-indigo-700 bg-indigo-100 px-2 py-1 rounded-lg">${pinyinize(randomItem.char)}</span>` + 
                pinyinize(' 在哪里？');
            
            document.getElementById('instruction-text').innerHTML = instructionHTML;
        }

        function showAnswer() {
            if (isWaitingForNext || hasUsedHint) return;
            hasUsedHint = true;
            
            // Highlight the correct button
            const correctBtn = document.querySelector(`.answer-btn[data-zone="${currentTask.zone.id}"]`);
            correctBtn.classList.add('ring-4', 'ring-yellow-400', 'bg-yellow-50');
            
            // Show reference answer sentence
            const feedback = document.getElementById('feedback-msg');
            const referenceSentence = `答案：${currentTask.item.char}在桌子的${currentTask.zone.char}。`;
            feedback.innerHTML = pinyinize(referenceSentence);
            feedback.className = "text-base sm:text-lg font-bold min-h-[3.5rem] flex items-center justify-center w-full break-words px-2 text-yellow-600 pop-in text-center";
            
            // Hide the hint button
            document.getElementById('hint-btn').style.display = 'none';
        }

        function checkAnswer(selectedZoneId, btnElement) {
            if (isWaitingForNext) return;

            if (selectedZoneId === currentTask.zone.id) {
                // Correct
                isWaitingForNext = true;
                if (!hasUsedHint) {
                    score += 10;
                }
                updateScore();
                
                // Automatically show reference sentence on correct answer
                const feedback = document.getElementById('feedback-msg');
                const referenceSentence = `答案：${currentTask.item.char}在桌子的${currentTask.zone.char}。`;
                
                if (hasUsedHint) {
                    feedback.innerHTML = pinyinize(`很好！ ${referenceSentence}`);
                } else {
                    feedback.innerHTML = pinyinize(`真棒！ ${referenceSentence}`);
                }
                feedback.className = "text-base sm:text-lg font-bold min-h-[3.5rem] flex items-center justify-center w-full break-words px-2 text-emerald-600 pop-in text-center";
                
                // Hide hint button since they answered correctly
                document.getElementById('hint-btn').style.display = 'none';
                
                // Styling correct button
                btnElement.classList.remove('ring-4', 'ring-yellow-400', 'bg-yellow-50');
                btnElement.classList.add('success-flash', 'border-emerald-400');
                
                try { document.getElementById('success-sound').play(); } catch(e){}

                // Give the student 3 seconds to read the full sentence before moving on
                setTimeout(() => {
                    generateNewTask();
                }, 3000);

            } else {
                // Wrong
                const feedback = document.getElementById('feedback-msg');
                feedback.innerHTML = pinyinize('不对，再试一次！');
                feedback.className = "text-base sm:text-lg font-bold min-h-[3.5rem] flex items-center justify-center w-full break-words px-2 text-red-500 pop-in text-center";
                
                // Styling wrong button
                btnElement.classList.add('bg-red-50', 'border-red-400', 'shake');
                setTimeout(() => {
                    btnElement.classList.remove('shake');
                }, 400);

                try { document.getElementById('fail-sound').play(); } catch(e){}
            }
        }

        // Run
        window.onload = initApp;
    </script>
</body>
</html>
