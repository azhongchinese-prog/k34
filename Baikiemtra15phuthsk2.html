            part1: [

                { id: "p2_2", points: 5, type: "tf", text: "明{míng}天{tiān}星{xīng}期{qī}天{tiān}，我{wǒ}不{bù}去{qù}学{xué}校{xiào}。 -> 明{míng}天{tiān}休{xiū}息{xi}。", correct: true, explanation: "Chủ nhật không đến trường có nghĩa là được nghỉ ngơi." },
                { id: "p2_3", points: 5, type: "tf", text: "她{tā}的{de}房{fáng}间{jiān}是{shì}粉{fěn}色{sè}的{de}。 -> 她{tā}不{bù}喜{xǐ}欢{huan}粉{fěn}色{sè}。", correct: false, explanation: "Phòng cô ấy màu hồng nên khả năng cao cô ấy thích màu hồng, câu suy luận 'không thích' là sai." },
                { id: "p2_4", points: 5, type: "tf", text: "这{zhè}个{ge}菜{cài}很{hěn}好{hǎo}吃{chī}，我{wǒ}吃{chī}了{le}很{hěn}多{duō}。 -> 菜{cài}不{bù}好{hǎo}吃{chī}。", correct: false, explanation: "Ăn rất nhiều vì món ăn ngon, câu kết luận 'món ăn không ngon' là sai." },
                { id: "p2_5", points: 5, type: "tf", text: "我{wǒ}想{xiǎng}买{mǎi}一{yí}个{gè}新{xīn}手{shǒu}机{jī}。 -> 我{wǒ}的{de}手{shǒu}机{jī}是{shì}新{xīn}的{de}。", correct: false, explanation: "Đang muốn mua điện thoại mới, tức là điện thoại hiện tại chưa phải cái mới." },
                { id: "p2_6", points: 5, type: "tf", text: "他{tā}今{jīn}天{tiān}生{shēng}病{bìng}了{le}，没{méi}去{qù}上{shàng}班{bān}。 -> 他{tā}在{zài}家{jiā}。", correct: true, explanation: "Bị ốm không đi làm thì ở nhà nghỉ ngơi là logic đúng." },
                { id: "p2_7", points: 5, type: "tf", text: "外{wài}面{miàn}下{xià}雨{yǔ}了{le}，你{nǐ}带{dài}伞{sǎn}吧{ba}。 -> 天{tiān}气{qì}很{hěn}好{hǎo}。", correct: false, explanation: "Bên ngoài trời mưa thì không thể gọi là thời tiết rất đẹp được." },
                { id: "p2_8", points: 5, type: "tf", text: "妈{mā}妈{ma}在{zài}做{zuò}饭{fàn}。 -> 妈{mā}妈{ma}在{zài}厨{chú}房{fáng}。", correct: true, explanation: "Mẹ đang nấu cơm thì mẹ ở trong phòng bếp là hợp lý." },
                { id: "p2_9", points: 5, type: "tf", text: "这{zhè}本{běn}书{shū}我{wǒ}看{kàn}过{guo}了{le}。 -> 我{wǒ}知{zhī}道{dào}书{shū}里{lǐ}的{de}内{nèi}容{róng}。", correct: true, explanation: "Đã đọc cuốn sách đó rồi nên sẽ biết nội dung bên trong." },
                { id: "p2_10", points: 5, type: "tf", text: "我{wǒ}没{méi}有{yǒu}钱{qián}买{mǎi}票{piào}。 -> 我{wǒ}可{kě}以{yǐ}去{qù}看{kàn}电{diàn}影{yǐng}。", correct: false, explanation: "Không có tiền mua vé thì không thể đi xem phim được." }
            ],
            part3: [
                { id: "p3_1", points: 7, type: "order", words: ["每{měi}天{tiān}", "去{qù}", "我{wǒ}", "打{dǎ}篮{lán}球{qiú}", "都{dōu}"], correct: [2, 0, 4, 1, 3], explanation: "Ngữ pháp: Trạng ngữ thời gian (每天) + Phó từ (都) + Động từ (去). (我每天都去打篮球 - Mỗi ngày tôi đều đi chơi bóng rổ)." },
                { id: "p3_2", points: 7, type: "order", words: ["的{de}", "这{zhè}", "今{jīn}天{tiān}早{zǎo}上{shang}", "报{bào}纸{zhǐ}", "是{shì}"], correct: [1, 4, 2, 0, 3], explanation: "Ngữ pháp: Định ngữ + 的 + Trung tâm ngữ. (这是今天早上的报纸 - Đây là báo của sáng hôm nay)." },
                { id: "p3_3", points: 7, type: "order", words: ["很{hěn}", "今{jīn}天{tiān}的{de}", "好{hǎo}吃{chī}", "羊{yáng}肉{ròu}"], correct: [1, 3, 0, 2], explanation: "Ngữ pháp: Câu vị ngữ tính từ (Chủ ngữ + Phó từ + Tính từ). (今天的羊肉很好吃 - Thịt cừu hôm nay rất ngon)." },
                { id: "p3_4", points: 7, type: "order", words: ["我{wǒ}女{nǚ}儿{ér}的{de}", "是{shì}", "房{fáng}间{jiān}", "粉{fěn}色{sè}的{de}", "这{zhè}个{ge}"], correct: [4, 3, 2, 1, 0], explanation: "Ngữ pháp: Lược bỏ danh từ sau '的' (我女儿的 = 我女儿的房间). (这个粉色的房间是我女儿的 - Căn phòng màu hồng này là của con gái tôi)." },
                { id: "p3_5", points: 7, type: "order", words: ["汉{hàn}语{yǔ}", "大{dà}卫{wèi}", "北{běi}京{jīng}", "学{xué}习{xí}", "在{zài}"], correct: [1, 4, 2, 3, 0], explanation: "Ngữ pháp: Giới từ chỉ nơi chốn 在 + Địa điểm + Động từ. (大卫在北京学习汉语 - David học tiếng Hán ở Bắc Kinh)." },
                { id: "p3_6", points: 7, type: "order", words: ["八{bā}点{diǎn}半{bàn}", "每{měi}天{tiān}", "上{shàng}课{kè}", "我{wǒ}们{men}学{xué}校{xiào}"], correct: [3, 1, 0, 2], explanation: "Ngữ pháp: Trật tự thời gian (Chủ ngữ + Thời gian + Động từ). (我们学校每天八点半上课 - Trường chúng tôi mỗi ngày 8 rưỡi vào học)." },
                { id: "p3_7", points: 7, type: "order", words: ["为{wèi}什{shén}么{me}", "你{nǐ}", "没{méi}去{qù}", "昨{zuó}天{tiān}", "学{xué}校{xiào}"], correct: [1, 3, 0, 2, 4], explanation: "Ngữ pháp: Đại từ nghi vấn '为什么' (Tại sao). (你昨天为什么没去学校 - Hôm qua tại sao bạn không đến trường?)." },
                { id: "p3_8", points: 7, type: "order", words: ["是{shì}", "旁{páng}边{biān}", "我{wǒ}的{de}", "那{nà}个{ge}", "小{xiǎo}房{fáng}间{jiān}"], correct: [1, 3, 4, 0, 2], explanation: "Ngữ pháp: Phương vị từ (旁边) làm định ngữ. (旁边那个小房间是我的 - Căn phòng nhỏ ở bên cạnh là của tôi)." },
                { id: "p3_9", points: 7, type: "order", words: ["她{tā}", "今{jīn}天{tiān}", "上{shàng}班{bān}", "没{méi}去{qù}"], correct: [0, 1, 3, 2], explanation: "Ngữ pháp: Phủ định hành động trong quá khứ dùng '没/没有'. (她今天没去上班 - Hôm nay cô ấy không đi làm)." },
                { id: "p3_10", points: 7, type: "order", words: ["不{bú}要{yào}", "了{le}", "看{kàn}", "报{bào}纸{zhǐ}"], correct: [0, 2, 3, 1], explanation: "Ngữ pháp: Cấu trúc khuyên ngăn 不要...了 (Đừng... nữa). (不要看报纸了 - Đừng đọc báo nữa)." }
            ],
            part4: [
                { id: "p4_1", points: 5, type: "mc_char", character: "吃{chī}", options: ["Uống", "Ăn", "Đi", "Nhìn"], correct: 1, explanation: "吃 (chī) nghĩa là Ăn." },
                { id: "p4_2", points: 5, type: "mc_char", character: "喝{hē}", options: ["Ăn", "Ngủ", "Uống", "Viết"], correct: 2, explanation: "喝 (hē) nghĩa là Uống." },
                { id: "p4_3", points: 5, type: "mc_char", character: "买{mǎi}", options: ["Bán", "Mua", "Mới", "Cũ"], correct: 1, explanation: "买 (mǎi) nghĩa là Mua." },
                { id: "p4_4", points: 5, type: "mc_char", character: "看{kàn}", options: ["Nghe", "Nói", "Đọc/Nhìn", "Viết"], correct: 2, explanation: "看 (kàn) nghĩa là Nhìn, xem, đọc." },
                { id: "p4_5", points: 5, type: "mc_char", character: "听{tīng}", options: ["Nghe", "Nhìn", "Nói", "Hỏi"], correct: 0, explanation: "听 (tīng) nghĩa là Nghe." },
                { id: "p4_6", points: 5, type: "mc_char", character: "走{zǒu}", options: ["Chạy", "Đi bộ", "Bay", "Nhảy"], correct: 1, explanation: "走 (zǒu) nghĩa là Đi, đi bộ." },
                { id: "p4_7", points: 5, type: "mc_char", character: "坐{zuò}", options: ["Đứng", "Nằm", "Ngồi", "Đi"], correct: 2, explanation: "坐 (zuò) nghĩa là Ngồi." },
                { id: "p4_8", points: 5, type: "mc_char", character: "水{shuǐ}", options: ["Lửa", "Đất", "Nước", "Gió"], correct: 2, explanation: "水 (shuǐ) nghĩa là Nước." },
                { id: "p4_9", points: 5, type: "mc_char", character: "火{huǒ}", options: ["Nước", "Lửa", "Cây", "Trời"], correct: 1, explanation: "火 (huǒ) nghĩa là Lửa." },
                { id: "p4_10", points: 5, type: "mc_char", character: "书{shū}", options: ["Vở", "Bút", "Sách", "Bàn"], correct: 2, explanation: "书 (shū) nghĩa là Sách." }
            ]
        };

        // --- HÀM RENDER PINYIN TỪ CHUỖI ---
        const PinyinText = ({ text, charSize = "text-xl", pinyinSize = "text-[10px]" }) => {
            if (!text) return null;
            const regex = /([^\{]+)(?:\{([^\}]+)\})?/g;
            const parts = [];
            let match;
            
            const processString = (str) => {
                const result = [];
                let currentIndex = 0;
                const charRegex = /(.)\{([^\}]+)\}/g;
                let charMatch;
                
                while ((charMatch = charRegex.exec(str)) !== null) {
                    if (charMatch.index > currentIndex) {
                        result.push({ type: 'text', content: str.substring(currentIndex, charMatch.index) });
                    }
                    result.push({ type: 'ruby', char: charMatch[1], pinyin: charMatch[2] });
                    currentIndex = charRegex.lastIndex;
                }
                
                if (currentIndex < str.length) {
                    result.push({ type: 'text', content: str.substring(currentIndex) });
                }
                return result;
            };

            const parsed = processString(text);

            return (
                <span className="inline-flex flex-wrap items-end space-x-[1px]">
                    {parsed.map((item, index) => {
                        if (item.type === 'ruby') {
                            return (
                                <ruby key={index} className="flex flex-col items-center justify-end leading-none mx-[1px]">
                                    <rt className={`${pinyinSize} text-gray-500 mb-1 font-sans`}>{item.pinyin}</rt>
                                    <span className={`${charSize} font-medium text-gray-800`}>{item.char}</span>
                                </ruby>
                            );
                        }
                        return <span key={index} className={`${charSize} text-gray-800 font-medium whitespace-pre-wrap self-end pb-1`}>{item.content}</span>;
                    })}
                </span>
            );
        };

        const App = () => {
            const [status, setStatus] = useState('start');
            const [timeLeft, setTimeLeft] = useState(15 * 60);
            const [answers, setAnswers] = useState({});
            const [playCount, setPlayCount] = useState(0);
            const [cheats, setCheats] = useState(0);
            const [scoreInfo, setScoreInfo] = useState({ total: 0, max: 200, correctPercent: 0 });
            
            const [studentName, setStudentName] = useState('');
            const [currentTab, setCurrentTab] = useState(1);
            
            const audioRef = useRef(null);

            useEffect(() => {
                let timer;
                if (status === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                handleSubmit();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [status, timeLeft]);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && status === 'playing') {
                        setCheats(prev => prev + 1);
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [status]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const startTest = () => {
                if (!studentName.trim()) return;
                
                setStatus('playing');
                const initialAnswers = {};
                questionsData.part3.forEach(q => {
                    initialAnswers[q.id] = [];
                });
                setAnswers(initialAnswers);
            };

            const handlePlayAudio = () => {
                if (playCount < 2 && audioRef.current) {
                    audioRef.current.play();
                    setPlayCount(prev => prev + 1);
                }
            };

            const setAnswer = (qId, value) => {
                setAnswers(prev => ({ ...prev, [qId]: value }));
            };

            const toggleOrderWord = (qId, wordIndex) => {
                setAnswers(prev => {
                    const currentArr = prev[qId] || [];
                    if (currentArr.includes(wordIndex)) {
                        return { ...prev, [qId]: currentArr.filter(i => i !== wordIndex) };
                    } else {
                        return { ...prev, [qId]: [...currentArr, wordIndex] };
                    }
                });
            };

            const handleSubmit = () => {
                if (status === 'result') return;
                
                let totalPoints = 0;
                
                [...questionsData.part1, ...questionsData.part4].forEach(q => {
                    if (answers[q.id] === q.correct) totalPoints += q.points;
                });

                questionsData.part2.forEach(q => {
                    if (answers[q.id] === q.correct) totalPoints += q.points;
                });

                questionsData.part3.forEach(q => {
                    const ans = answers[q.id] || [];
                    if (JSON.stringify(ans) === JSON.stringify(q.correct)) {
                        totalPoints += q.points;
                    }
                });

                setScoreInfo({
                    total: totalPoints,
                    max: 200,
                    correctPercent: Math.round((totalPoints / 200) * 100)
                });
                
                if (audioRef.current) {
                    audioRef.current.pause();
                }
                setStatus('result');
            };

            const renderStartScreen = () => (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-xl p-8 max-w-lg w-full text-center border-t-8 border-green-500 transform transition-all hover:scale-[1.01]">
                        <h1 className="text-3xl font-bold text-green-700 mb-2">Bài Thi HSK 2</h1>
                        <p className="text-gray-500 mb-6 font-medium">Giáo trình chuẩn - Luyện tập tổng hợp</p>
                        
                        <div className="bg-green-50 rounded-xl p-6 text-left mb-6 space-y-4">
                            <h2 className="font-bold text-green-800 flex items-center">
                                <span>📋 Hướng dẫn làm bài:</span>
                            </h2>
                            <ul className="list-disc pl-5 text-gray-700 space-y-2 text-sm">
                                <li>Thời gian làm bài: <b>15 phút</b> đếm ngược.</li>
                                <li>Tổng điểm: <b>200 điểm</b> (33 câu).</li>
                                <li>Bài thi chia làm 4 phần, mỗi phần nằm ở một Tab riêng.</li>
                                <li><b>Phần nghe:</b> Chỉ được phát âm thanh tối đa <b>2 lần</b>.</li>
                                <li><b>Tuyệt đối không thoát màn hình:</b> Hệ thống sẽ ghi nhận vi phạm.</li>
                            </ul>
                        </div>

                        <div className="mb-6">
                            <label className="block text-left text-gray-700 font-bold mb-2">Họ và tên học sinh <span className="text-red-500">*</span></label>
                            <input 
                                type="text" 
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                placeholder="Nhập họ và tên của bạn..." 
                                className="w-full p-4 border-2 border-green-200 rounded-xl focus:outline-none focus:border-green-500 transition-colors"
                            />
                        </div>
                        
                        <button 
                            onClick={startTest}
                            disabled={!studentName.trim()}
                            className={`font-bold py-4 px-10 rounded-full text-lg shadow-lg transition-all w-full ${!studentName.trim() ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 text-white hover:shadow-xl active:scale-95'}`}
                        >
                            BẮT ĐẦU LÀM BÀI
                        </button>
                    </div>
                </div>
            );

            const renderQuizScreen = () => (
                <div className="pb-24 max-w-3xl mx-auto w-full px-2 sm:px-4 pt-16 sm:pt-20">
                    <div className="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md shadow-sm z-50">
                        <div className="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className={`font-bold text-lg sm:text-xl flex items-center bg-gray-100 px-4 py-2 rounded-full ${timeLeft < 180 ? 'text-red-600 animate-pulse bg-red-50' : 'text-gray-700'}`}>
                                ⏳ {formatTime(timeLeft)}
                            </div>
                            <button 
                                onClick={() => {
                                    if(window.confirm('Bạn có chắc chắn muốn nộp bài sớm không?')) handleSubmit();
                                }}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 sm:px-6 sm:py-2 rounded-full font-bold shadow transition-colors text-sm sm:text-base"
                            >
                                NỘP BÀI
                            </button>
                        </div>
                        <div className="flex overflow-x-auto bg-gray-50 border-t border-b no-scrollbar">
                            {[
                                { id: 1, name: 'Phần 1: Nghe' },
                                { id: 2, name: 'Phần 2: Đọc' },
                                { id: 3, name: 'Phần 3: Sắp xếp' },
                                { id: 4, name: 'Phần 4: Chữ Hán' }
                            ].map((tab) => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`px-4 sm:px-6 py-3 whitespace-nowrap font-bold text-sm sm:text-base flex-1 text-center border-b-4 transition-colors ${currentTab === tab.id ? 'border-green-500 text-green-700 bg-white' : 'border-transparent text-gray-500 hover:bg-gray-100 hover:text-gray-700'}`}
                                >
                                    {tab.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="mt-16 sm:mt-12">
                        {/* TAB 1 */}
                        <div className={currentTab === 1 ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                            <div className="bg-white rounded-2xl shadow-sm border border-blue-100 p-5 mb-6 sticky top-32 z-40">
                                <h2 className="font-bold text-blue-800 mb-3 flex items-center">
                                    <span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-full flex items-center justify-center mr-2">🎧</span>
                                    File Nghe
                                </h2>
                                <audio ref={audioRef} src={audioUrl} className="hidden"></audio>
                                <div className="flex flex-col sm:flex-row items-center gap-4">
                                    <button 
                                        onClick={handlePlayAudio}
                                        disabled={playCount >= 2}
                                        className={`flex-1 w-full py-3 px-4 rounded-xl font-bold flex justify-center items-center transition-all ${
                                            playCount >= 2 
                                            ? 'bg-gray-200 text-gray-500 cursor-not-allowed' 
                                            : 'bg-blue-500 hover:bg-blue-600 text-white shadow-md active:scale-95'
                                        }`}
                                    >
                                        {playCount >= 2 ? '🚫 Đã hết lượt nghe' : `▶️ Bấm để nghe (Còn ${2 - playCount} lần)`}
                                    </button>
                                    <span className="text-sm text-gray-500 bg-gray-50 px-3 py-1 rounded-lg">Không thể dừng giữa chừng</span>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm p-4 sm:p-6 mb-6">
                                <h2 className="text-xl font-bold text-green-700 mb-4 border-b pb-2">Nghe và chọn đáp án đúng (30 điểm)</h2>
                                <div className="space-y-8">
                                    {questionsData.part1.map(q => (
                                        <div key={q.id} className="bg-green-50/30 p-4 rounded-xl">
                                            <div className="mb-4 font-semibold text-lg"><PinyinText text={q.question} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                {q.options.map((opt, i) => (
                                                    <label key={i} className={`flex items-center p-3 rounded-xl border-2 cursor-pointer transition-all ${answers[q.id] === i ? 'border-green-500 bg-green-50' : 'border-gray-200 bg-white hover:border-green-300'}`}>
                                                        <input type="radio" name={q.id} className="hidden" onChange={() => setAnswer(q.id, i)} checked={answers[q.id] === i} />
                                                        <div className={`w-5 h-5 rounded-full border-2 mr-3 flex-shrink-0 flex items-center justify-center ${answers[q.id] === i ? 'border-green-500' : 'border-gray-300'}`}>
                                                            {answers[q.id] === i && <div className="w-2.5 h-2.5 bg-green-500 rounded-full"></div>}
                                                        </div>
                                                        <PinyinText text={opt} />
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* TAB 2 */}
                        <div className={currentTab === 2 ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                            <div className="bg-white rounded-2xl shadow-sm p-4 sm:p-6 mb-6">
                                <h2 className="text-xl font-bold text-orange-600 mb-4 border-b pb-2">Đọc hiểu - Chọn Đúng/Sai (50 điểm)</h2>
                                <p className="text-sm text-gray-500 mb-4 italic">Đọc câu đầu tiên và xem câu suy luận (sau dấu mũi tên) là đúng hay sai với logic.</p>
                                <div className="space-y-4">
                                    {questionsData.part2.map((q, idx) => (
                                        <div key={q.id} className="bg-orange-50/30 p-4 rounded-xl border border-orange-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                            <div className="flex-1">
                                                <span className="font-bold text-orange-400 mr-2">{idx + 1}.</span>
                                                <PinyinText text={q.text} />
                                            </div>
                                            <div className="flex space-x-2 shrink-0">
                                                <button 
                                                    onClick={() => setAnswer(q.id, true)}
                                                    className={`px-4 py-2 rounded-lg font-bold transition-all ${answers[q.id] === true ? 'bg-green-500 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                                >
                                                    ✔️ Đúng
                                                </button>
                                                <button 
                                                    onClick={() => setAnswer(q.id, false)}
                                                    className={`px-4 py-2 rounded-lg font-bold transition-all ${answers[q.id] === false ? 'bg-red-500 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                                >
                                                    ❌ Sai
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* TAB 3 */}
                        <div className={currentTab === 3 ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                            <div className="bg-white rounded-2xl shadow-sm p-4 sm:p-6 mb-6">
                                <h2 className="text-xl font-bold text-purple-700 mb-4 border-b pb-2">Sắp xếp câu (70 điểm)</h2>
                                <p className="text-sm text-gray-500 mb-4 italic">Vận dụng các điểm ngữ pháp đã học. Bấm vào các từ bên dưới để tạo thành câu hoàn chỉnh.</p>
                                <div className="space-y-6">
                                    {questionsData.part3.map((q, idx) => {
                                        const selectedIndices = answers[q.id] || [];
                                        const isComplete = selectedIndices.length === q.words.length;
                                        
                                        return (
                                            <div key={q.id} className="bg-purple-50/30 p-4 rounded-xl border border-purple-100">
                                                <div className="font-bold text-purple-600 mb-2">Câu {idx + 1}:</div>
                                                
                                                <div className="min-h-[60px] bg-white border-2 border-dashed border-purple-300 rounded-xl p-3 mb-4 flex flex-wrap gap-2 items-center">
                                                    {selectedIndices.length === 0 && <span className="text-gray-400 text-sm italic">Đáp án của bạn sẽ hiện ở đây...</span>}
                                                    {selectedIndices.map((wordIdx) => (
                                                        <button 
                                                            key={`sel-${wordIdx}`}
                                                            onClick={() => toggleOrderWord(q.id, wordIdx)}
                                                            className="bg-purple-100 border border-purple-300 text-purple-900 px-3 py-1.5 rounded-lg shadow-sm hover:bg-red-50 hover:border-red-300 hover:text-red-600 transition-all flex items-center group"
                                                        >
                                                            <PinyinText text={q.words[wordIdx]} />
                                                            <span className="hidden group-hover:inline ml-1 text-xs">✕</span>
                                                        </button>
                                                    ))}
                                                </div>

                                                <div className={`flex flex-wrap gap-2 transition-opacity ${isComplete ? 'opacity-50 pointer-events-none' : 'opacity-100'}`}>
                                                    {q.words.map((word, wordIdx) => {
                                                        const isSelected = selectedIndices.includes(wordIdx);
                                                        if (isSelected) return null;
                                                        return (
                                                            <button 
                                                                key={`avail-${wordIdx}`}
                                                                onClick={() => toggleOrderWord(q.id, wordIdx)}
                                                                className="bg-white border-2 border-gray-200 hover:border-purple-400 hover:bg-purple-50 text-gray-800 px-3 py-1.5 rounded-lg shadow-sm transition-all active:scale-95"
                                                            >
                                                                <PinyinText text={word} />
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* TAB 4 */}
                        <div className={currentTab === 4 ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                            <div className="bg-white rounded-2xl shadow-sm p-4 sm:p-6 mb-6">
                                <h2 className="text-xl font-bold text-teal-700 mb-4 border-b pb-2">Chữ Hán độc thể (50 điểm)</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {questionsData.part4.map((q, idx) => (
                                        <div key={q.id} className="bg-teal-50/30 p-4 rounded-xl border border-teal-100 flex flex-col justify-between">
                                            <div className="text-center mb-4">
                                                <div className="mb-2 font-semibold text-gray-600 text-sm">
                                                    Câu {idx + 1}. Chọn nghĩa đúng của chữ Hán sau:
                                                </div>
                                                <div className="flex justify-center my-4">
                                                    <PinyinText text={q.character} charSize="text-5xl" pinyinSize="text-base" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 mt-auto">
                                                {q.options.map((opt, i) => (
                                                    <button 
                                                        key={i} 
                                                        onClick={() => setAnswer(q.id, i)}
                                                        className={`py-2 px-3 text-sm font-medium rounded-lg border transition-all text-center ${
                                                            answers[q.id] === i 
                                                            ? 'bg-teal-500 text-white border-teal-600 shadow' 
                                                            : 'bg-white text-gray-700 border-gray-200 hover:bg-teal-50'
                                                        }`}
                                                    >
                                                        {String.fromCharCode(65 + i)}. {opt}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Nút điều hướng */}
                        <div className="flex justify-between items-center mt-6">
                            <button
                                onClick={() => setCurrentTab(prev => Math.max(1, prev - 1))}
                                className={`px-6 py-3 rounded-xl font-bold transition-all ${currentTab === 1 ? 'opacity-0 pointer-events-none' : 'bg-gray-200 hover:bg-gray-300 text-gray-700'}`}
                            >
                                ⬅ Phần Trước
                            </button>
                            
                            {currentTab < 4 ? (
                                <button
                                    onClick={() => setCurrentTab(prev => Math.min(4, prev + 1))}
                                    className="px-6 py-3 rounded-xl font-bold bg-green-500 hover:bg-green-600 text-white shadow-md transition-all active:scale-95"
                                >
                                    Phần Tiếp ➡
                                </button>
                            ) : (
                                <button
                                    onClick={() => {
                                        if(window.confirm('Bạn có chắc chắn muốn nộp bài?')) handleSubmit();
                                    }}
                                    className="px-8 py-3 rounded-xl font-bold bg-blue-600 hover:bg-blue-700 text-white shadow-lg transition-all active:scale-95"
                                >
                                    NỘP BÀI THI
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderResultScreen = () => {
                const isPass = scoreInfo.correctPercent >= 60;

                return (
                    <div className="max-w-4xl mx-auto w-full px-2 sm:px-4 py-8">
                        <div className="bg-red-600 text-white text-center p-4 rounded-2xl shadow-lg mb-6 animate-bounce">
                            <h2 className="font-bold text-lg sm:text-xl">⚠️ YÊU CẦU QUAN TRỌNG</h2>
                            <p className="font-medium text-red-100">Vui lòng chụp lại toàn bộ màn hình kết quả này và gửi ngay cho Giáo viên của bạn!</p>
                        </div>

                        <div className="bg-white rounded-3xl shadow-lg overflow-hidden mb-8 border border-gray-100">
                            <div className={`p-8 text-center text-white ${isPass ? 'bg-gradient-to-br from-green-500 to-emerald-600' : 'bg-gradient-to-br from-orange-500 to-red-600'}`}>
                                <h1 className="text-3xl font-bold mb-2">BÁO CÁO KẾT QUẢ</h1>
                                <p className="opacity-90 text-lg font-medium mb-1">Học sinh: <span className="font-bold uppercase text-yellow-200">{studentName}</span></p>
                                <p className="opacity-80 text-sm mb-6">Bài kiểm tra tổng hợp HSK 2</p>
                                
                                <div className="bg-white/20 inline-block px-8 py-6 rounded-3xl backdrop-blur-sm border border-white/30 shadow-inner">
                                    <div className="text-6xl font-black mb-1">{scoreInfo.total}<span className="text-3xl opacity-80 font-bold">/{scoreInfo.max}</span></div>
                                    <div className="text-lg font-semibold tracking-wider uppercase">ĐIỂM</div>
                                </div>
                                
                                <div className="mt-6 flex justify-center gap-6">
                                    <div className="bg-black/10 px-4 py-2 rounded-xl">
                                        <span className="block text-sm opacity-80">Tỉ lệ đúng</span>
                                        <span className="font-bold text-xl">{scoreInfo.correctPercent}%</span>
                                    </div>
                                    <div className="bg-black/10 px-4 py-2 rounded-xl">
                                        <span className="block text-sm opacity-80">Đánh giá</span>
                                        <span className="font-bold text-xl">{isPass ? 'Đạt ✅' : 'Chưa Đạt ❌'}</span>
                                    </div>
                                </div>
                            </div>
                            
                            {cheats > 0 && (
                                <div className="bg-red-50 border-b border-red-100 p-4 text-center">
                                    <span className="text-red-600 font-bold flex items-center justify-center">
                                        <span className="text-xl mr-2">🚨</span> 
                                        Hệ thống phát hiện: Bạn đã rời khỏi màn hình làm bài {cheats} lần!
                                    </span>
                                </div>
                            )}
                        </div>

                        <div className="space-y-8">
                            <h3 className="text-2xl font-bold text-gray-800 text-center uppercase tracking-wide">Chi tiết bài làm</h3>
                            {renderReviewSection("Phần 1: Nghe hiểu", questionsData.part1, "mc")}
                            {renderReviewSection("Phần 2: Đúng / Sai", questionsData.part2, "tf")}
                            {renderReviewSection("Phần 3: Sắp xếp câu (Theo Ngữ Pháp)", questionsData.part3, "order")}
                            {renderReviewSection("Phần 4: Chữ Hán độc thể", questionsData.part4, "mc_char")}
                        </div>
                    </div>
                );
            };

            const renderReviewSection = (title, questions, type) => {
                return (
                    <div className="bg-white rounded-2xl shadow-sm p-4 sm:p-6 border border-gray-100">
                        <h4 className="text-lg font-bold text-gray-700 mb-4 pb-2 border-b">{title}</h4>
                        <div className="space-y-4">
                            {questions.map((q, idx) => {
                                let isCorrect = false;
                                let userAnswerDisplay = "Chưa làm";
                                let correctAnswerDisplay = "";

                                if (type === "mc" || type === "mc_char") {
                                    isCorrect = answers[q.id] === q.correct;
                                    if (answers[q.id] !== undefined) {
                                        userAnswerDisplay = type === "mc" ? <PinyinText text={q.options[answers[q.id]]} /> : q.options[answers[q.id]];
                                    }
                                    correctAnswerDisplay = type === "mc" ? <PinyinText text={q.options[q.correct]} /> : q.options[q.correct];
                                } 
                                else if (type === "tf") {
                                    isCorrect = answers[q.id] === q.correct;
                                    if (answers[q.id] !== undefined) userAnswerDisplay = answers[q.id] ? "Đúng" : "Sai";
                                    correctAnswerDisplay = q.correct ? "Đúng" : "Sai";
                                } 
                                else if (type === "order") {
                                    const ansArr = answers[q.id] || [];
                                    isCorrect = JSON.stringify(ansArr) === JSON.stringify(q.correct);
                                    if (ansArr.length > 0) {
                                        userAnswerDisplay = <PinyinText text={ansArr.map(i => q.words[i]).join('')} />;
                                    }
                                    correctAnswerDisplay = <PinyinText text={q.correct.map(i => q.words[i]).join('')} />;
                                }

                                return (
                                    <div key={q.id} className={`p-4 rounded-xl border-l-4 ${isCorrect ? 'border-green-500 bg-green-50/30' : 'border-red-500 bg-red-50/30'}`}>
                                        <div className="mb-2">
                                            <span className="font-bold mr-2 text-gray-700">Câu {idx + 1}.</span>
                                            {type === "tf" ? <PinyinText text={q.text} /> 
                                             : type === "mc_char" ? <span>Nghĩa của chữ <PinyinText text={q.character} /></span>
                                             : <PinyinText text={q.question || "Sắp xếp câu: " + q.words.join(' / ')} />}
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mt-3 bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
                                            <div>
                                                <span className="text-gray-500 block mb-1">Đáp án của bạn:</span>
                                                <div className={`font-medium ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                                    {isCorrect ? '✅' : '❌'} {userAnswerDisplay}
                                                </div>
                                            </div>
                                            {!isCorrect && (
                                                <div>
                                                    <span className="text-gray-500 block mb-1">Đáp án đúng:</span>
                                                    <div className="font-medium text-green-600">✅ {correctAnswerDisplay}</div>
                                                </div>
                                            )}
                                        </div>

                                        {!isCorrect && (
                                            <div className="mt-3 text-sm bg-yellow-50 text-yellow-800 p-3 rounded-lg border border-yellow-200">
                                                <strong className="text-yellow-900 block mb-1">💡 Giải thích:</strong> {q.explanation}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {status === 'start' && renderStartScreen()}
                    {status === 'playing' && renderQuizScreen()}
                    {status === 'result' && renderResultScreen()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
